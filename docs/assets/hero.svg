<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Erie Verilog Generator architecture banner</title>
  <desc id="desc">A refined RTL pipeline diagram showing an agent skill transforming hardware intent into Verilog, testbenches, and validation evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.52" stop-color="#24364B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="line" x1="210" y1="218" x2="1010" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B4F8C8"/>
      <stop offset="0.5" stop-color="#8CCBFF"/>
      <stop offset="1" stop-color="#FFB86B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <g opacity="0.18">
    <path d="M0 320 C180 210 300 350 480 268 C675 179 790 90 1200 150" stroke="#8CCBFF" stroke-width="2"/>
    <path d="M0 125 C220 185 310 70 515 126 C760 192 860 315 1200 270" stroke="#FFB86B" stroke-width="2"/>
    <path d="M120 80 h70 v42 h70 v-42 h70 v42 h70 v-42 h70 v42 h70 v-42 h70 v42 h70" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M120 310 h70 v-42 h70 v42 h70 v-42 h70 v42 h70 v-42 h70 v42 h70 v-42 h70" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  <text x="80" y="96" fill="#F8FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">Erie Verilog Generator</text>
  <text x="82" y="132" fill="#B9C7D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Agent skill for disciplined Verilog-2001 RTL generation</text>
  <g filter="url(#shadow)">
    <rect x="86" y="206" width="178" height="74" rx="12" fill="#182438" stroke="#B4F8C8" stroke-width="2"/>
    <rect x="324" y="206" width="178" height="74" rx="12" fill="#182438" stroke="#8CCBFF" stroke-width="2"/>
    <rect x="562" y="206" width="178" height="74" rx="12" fill="#182438" stroke="#8CCBFF" stroke-width="2"/>
    <rect x="800" y="206" width="178" height="74" rx="12" fill="#182438" stroke="#FFB86B" stroke-width="2"/>
  </g>
  <path d="M264 243 H324 M502 243 H562 M740 243 H800" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M312 236 L324 243 L312 250 M550 236 L562 243 L550 250 M788 236 L800 243 L788 250" stroke="#F8FBFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="124" y="236" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">RTL Intent</text>
  <text x="118" y="260" fill="#B9C7D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">ports, clocks, behavior</text>
  <text x="366" y="236" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Skill</text>
  <text x="350" y="260" fill="#B9C7D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">workflow + templates</text>
  <text x="594" y="236" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Runtime</text>
  <text x="596" y="260" fill="#B9C7D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">reference + extraction</text>
  <text x="840" y="236" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">RTL Evidence</text>
  <text x="835" y="260" fill="#B9C7D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Verilog + testbench</text>
  <text x="80" y="352" fill="#E8F1FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">requirements -> codegen plan -> Python reference -> Verilog RTL -> self-checking testbench -> validation</text>
</svg>

