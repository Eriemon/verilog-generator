<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Verilog Generator hero</title>
  <desc id="desc">A polished technical banner for an agent skill that converts confirmed RTL intent into Verilog artifacts and validation evidence.</desc>
  <defs>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1002 126) rotate(145) scale(650 310)">
      <stop stop-color="#A3E635" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#60A5FA" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#071019"/>
    </linearGradient>
    <linearGradient id="stroke" x1="168" y1="322" x2="1020" y2="322" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A3E635"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="190%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="520" rx="28" fill="url(#glowA)"/>
  <g opacity="0.16">
    <path d="M104 156h72v44h72v-44h72v44h72v-44h72v44h72v-44h72v44h72v-44h72v44h72v-44h72" stroke="#E6EDF3" stroke-width="2"/>
    <path d="M104 414h72v-44h72v44h72v-44h72v44h72v-44h72v44h72v-44h72v44h72v-44h72v44h72" stroke="#E6EDF3" stroke-width="2"/>
    <path d="M88 242H1192M88 322H1192" stroke="#E6EDF3"/>
  </g>

  <g transform="translate(88 76)">
    <text x="0" y="34" fill="#E6EDF3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">AGENT SKILL</text>
    <text x="0" y="98" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">Verilog Generator</text>
    <text x="2" y="140" fill="#A9B8C8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Disciplined Verilog-2001 RTL workflows for AI coding agents</text>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="94" y="286" width="214" height="88" rx="18" fill="#101D31" stroke="#A3E635" stroke-width="1.6"/>
    <rect x="382" y="286" width="214" height="88" rx="18" fill="#101D31" stroke="#60A5FA" stroke-width="1.6"/>
    <rect x="670" y="286" width="214" height="88" rx="18" fill="#101D31" stroke="#60A5FA" stroke-width="1.6"/>
    <rect x="958" y="286" width="214" height="88" rx="18" fill="#101D31" stroke="#FDBA74" stroke-width="1.6"/>

    <path d="M308 330H382M596 330H670M884 330H958" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round"/>
    <path d="M370 320L382 330L370 340M658 320L670 330L658 340M946 320L958 330L946 340" stroke="#D8E7F5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="124" y="324" fill="#FFFFFF" font-size="20" font-weight="800">RTL Contract</text>
    <text x="124" y="350" fill="#9FB0C3" font-size="14">ports, clocks, behavior</text>

    <text x="414" y="324" fill="#FFFFFF" font-size="20" font-weight="800">Templates</text>
    <text x="414" y="350" fill="#9FB0C3" font-size="14">AXI, AHB, APB patterns</text>

    <text x="702" y="324" fill="#FFFFFF" font-size="20" font-weight="800">Runtime</text>
    <text x="702" y="350" fill="#9FB0C3" font-size="14">prompt, extract, validate</text>

    <text x="990" y="324" fill="#FFFFFF" font-size="20" font-weight="800">Evidence</text>
    <text x="990" y="350" fill="#9FB0C3" font-size="14">RTL, tests, traces</text>
  </g>

  <g transform="translate(88 432)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="152" height="36" rx="18" fill="#17233A" stroke="#31415F"/>
