    <rect x="302" y="0" width="146" height="36" rx="18" fill="#17233A" stroke="#31415F"/>
    <text x="22" y="23" fill="#D8E7F5" font-size="14" font-weight="700">Verilog-2001</text>
    <text x="190" y="23" fill="#D8E7F5" font-size="14" font-weight="700">RTL</text>
    <text x="324" y="23" fill="#D8E7F5" font-size="14" font-weight="700">Self-checking TB</text>
  </g>
